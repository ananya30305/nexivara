<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexivara – Smart Career Decision Engine</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #030506;
            --panel: rgba(7, 16, 11, 0.92);
            --text: #e8ffe8;
            --muted: #a8f2ff;
            --accent: #00e5ff;
            --border: rgba(0, 229, 255, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, rgba(21,255,128,0.08), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(124,255,126,0.12), transparent 28%),
                        linear-gradient(180deg, #050608 0%, #070c10 100%);
            color: var(--text);
        }

        body.splash-page {
            background: #000;
        }

        body.loading-page {
            background: #000;
        }

        .page-fade {
            opacity: 0;
            animation: fadeInPage 0.8s ease forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        select, option {
            background-color: #0b0b0b !important;
            color: #ffffff !important;
            border: 1px solid rgba(0, 229, 255, 0.5) !important;
        }

        select option:hover {
            background-color: rgba(0, 229, 255, 0.15) !important;
            color: #00e5ff !important;
        }

        .glass-card {
            background: var(--panel);
            border: 1px solid rgba(0, 229, 255, 0.18);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
        }

        .accent-border {
            border: 1px solid rgba(124,255,126,0.45);
        }

        .section-title {
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .neon-text {
            color: var(--accent);
            text-shadow: 0 0 18px rgba(0,229,255,0.95), 0 0 28px rgba(0,229,255,0.55);
        }

        .glass-card img {
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            object-fit: cover;
            width: 100%;
            height: 220px;
        }

        .glass-card .card-body {
            padding: 1.5rem;
        }

        .btn-accent {
            background: linear-gradient(135deg, #00e5ff, #00a4ff);
            color: #03110a;
            border: none;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.35);
        }

        .btn-accent:hover {
            background: linear-gradient(135deg, #34f2ff, #14baff);
            color: #03110a;
        }

        .metric-tag {
            color: #b6ffcd;
            font-size: 0.95rem;
        }

        .splash-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .loading-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .loading-screen img {
            width: 140px;
            margin-bottom: 1.6rem;
        }

        .form-sheet {
            padding: 2rem;
        }

        .range-value {
            font-weight: 700;
            color: var(--accent);
        }

        .result-banner {
            border: 1px solid rgba(124,255,126,0.18);
            background: rgba(5, 9, 8, 0.82);
        }

        @media (max-width: 768px) {
            .glass-card {
                border-radius: 18px;
            }
        }

        /* LOGOUT BUTTON */
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 1000;
        }

    </style>
</head>

<body class="{% block body_class %}{% endblock %} page-fade">

    <!-- ✅ SHOW ONLY ON FORM PAGE -->
    {% if session and session.get('user_id') and request.path == '/form' %}
        <div class="logout-btn">
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    {% endif %}

    <main class="pt-5">
        <div class="container py-5">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
