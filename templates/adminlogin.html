{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-xl-5 col-lg-6">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 style="max-width: 120px; margin-bottom: 1rem;">
            <h2 class="neon-text">ADMIN LOGIN</h2>
        </div>

        <div class="glass-card form-sheet">

            {% if error %}
                <p style="color:red; text-align:center;">{{ error }}</p>
            {% endif %}

            <form action="/admin-login" method="post">

                <!-- USERNAME -->
                <div class="mb-3">
                    <label class="form-label">Admin Username</label>
                    <input type="text" name="username"
                           class="form-control bg-dark text-white border-secondary"
                           required>
                </div>

                <!-- PASSWORD WITH ICON TOGGLE -->
                <div class="mb-3 position-relative">
                    <label class="form-label">Admin Password</label>

                    <input type="password" id="password"
                           name="password"
                           class="form-control bg-dark text-white border-secondary pe-5"
                           required>

                    <!-- Eye Icon -->
                    <i class="bi bi-eye-slash-fill"
                       id="togglePassword"
                       style="position:absolute; right:15px; top:42px; cursor:pointer; color:#00e5ff;">
                    </i>
                </div>

                <!-- SUBMIT -->
                <div class="text-center">
                    <button type="submit" class="btn btn-accent px-4">Login</button>
                </div>

            </form>

        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Bootstrap Icons CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);

        // Toggle icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash-fill');
    });
</script>
{% endblock %}
