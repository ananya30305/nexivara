{% extends "base.html" %}

{% block body_class %}loading-page{% endblock %}

{% block content %}
<div class="loading-screen text-center text-white px-4">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Nexivara Logo" class="mb-4" style="max-width: 180px;">
    
    <div class="spinner-border text-success" role="status" style="width: 4rem; height: 4rem;">
        <span class="visually-hidden">Loading...</span>
    </div>
    
    <p class="mt-4 text-muted">Loading Nexivara...</p>
</div>
{% endblock %}

{% block scripts %}
<script>
    setTimeout(function() {
        window.location.href = "/login-page";
    }, 2000);
</script>
{% endblock %}
